<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="../public/favicon.ico" type="image/x-icon">
  <title>Music Player</title>
</head>
<body>
  <main class="player-container" id="player-container">
    <!-- Capa do Álbum -->
    <div class="cover-wrapper">
      <img id="cover-image" src="./assets/images/cover-1.jpg" alt="Capa do Álbum">
    </div>

    <!-- Informações da Música -->
    <div class="info-wrapper">
      <h1 id="song-title"></h1>
      <p id="song-artist"></p>
    </div>

    <!-- Barra de Progresso e Tempo -->
    <div class="progress-wrapper">
      <div class="time-info">
        <span id="current-time"></span>
        <span id="duration"></span>
      </div>

      <input type="range" id="progress-bar" min="0" max="100" value="0">
    </div>

    <!-- Controles do Player -->
    <div class="controls-wrapper">
      <button id="prev-btn" aria-label="Música Anterior">
        <img src="./assets/icons/previous.svg" alt="Música Anterior" />
      </button>
      <button id="play-btn" class="play-btn" aria-label="Tocar/Pausar">
        <img id="player-icon" src="./assets/icons/play.svg" alt="Tocar/Pausar">
      </button>
      <button id="next-btn" aria-label="Próxima Música">
        <img src="./assets/icons/next.svg" alt="Próxima Música">
      </button>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
